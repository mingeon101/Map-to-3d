<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>OpenBVE 노선 설계 도구</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; display: flex; height: 100vh; }
        #map { flex: 3; position: relative; }
        #sidebar { flex: 1; padding: 20px; overflow-y: auto; background: #f8f9fa; border-left: 1px solid #ccc; font-size: 13px; }
        .point-item { margin-bottom: 5px; padding: 5px; background: white; border: 1px solid #ddd; }
        .controls { position: absolute; top: 10px; left: 10px; z-index: 5; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="map">
    <div class="controls">
        <strong>OpenBVE 노선 지정 모드</strong><br>
        <small>지도 위를 클릭하여 노선 점을 찍으세요.</small><br>
        <button onclick="clearPoints()">초기화</button>
    </div>
</div>
<div id="sidebar">
    <h3>📍 추출된 좌표 리스트</h3>
    <div id="pointList"></div>
</div>

<script>
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/liberty',
        center: [127.0276, 37.4979],
        zoom: 17,
        pitch: 60
    });

    let coordinates = [];

    // 지도 클릭 이벤트
    map.on('click', (e) => {
        const { lng, lat } = e.lngLat;
        coordinates.push([lng, lat]);

        updateMap();
        updateList();
    });

    function updateMap() {
        // 기존 소스/레이어 제거 후 재생성 (단순화된 방식)
        if (map.getSource('route')) {
            map.removeLayer('route-line');
            map.removeLayer('route-points');
            map.removeSource('route');
        }

        map.addSource('route', {
            'type': 'geojson',
            'data': {
                'type': 'FeatureCollection',
                'features': [
                    {
                        'type': 'Feature',
                        'geometry': { 'type': 'LineString', 'coordinates': coordinates }
                    },
                    ...coordinates.map(coord => ({
                        'type': 'Feature',
                        'geometry': { 'type': 'Point', 'coordinates': coord }
                    }))
                ]
            }
        });

        map.addLayer({
            'id': 'route-line',
            'type': 'line',
            'source': 'route',
            'paint': { 'line-color': '#ff0000', 'line-width': 3 }
        });

        map.addLayer({
            'id': 'route-points',
            'type': 'circle',
            'source': 'route',
            'paint': { 'circle-radius': 5, 'circle-color': '#007bff' }
        });
    }

    function updateList() {
        const listDiv = document.getElementById('pointList');
        listDiv.innerHTML = coordinates.map((c, i) => 
            `<div class="point-item"><strong>${i}:</strong> ${c[0].toFixed(6)}, ${c[1].toFixed(6)}</div>`
        ).join('');
    }

    function clearPoints() {
        coordinates = [];
        updateMap();
        updateList();
    }
</script>
</body>
</html>
